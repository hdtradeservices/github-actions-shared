name: Test Reusable Workflows

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  test-pr-validation:
    uses: ./.github/workflows/pr-validation.yml
    secrets: inherit

  test-scripts-standalone:
    name: Test Individual Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test commit format script
        run: |
          export GITHUB_BASE_REF=main
          export COMMIT_FORMAT_REGEX='^(feat|fix|docs|style|refactor|test|chore)(\([^\)]+\))?:'
          ./scripts/commit-format-check.sh || echo "Format check completed (exit code expected for test)"

      - name: Test commit length script
        run: |
          export GITHUB_BASE_REF=main
          export MAX_COMMIT_LENGTH=72
          ./scripts/commit-length-check.sh || echo "Length check completed (exit code expected for test)"

      - name: Test fixup script
        run: |
          export GITHUB_BASE_REF=main
          ./scripts/fixup-check.sh || echo "Fixup check completed (exit code expected for test)"

      - name: Validate script permissions
        run: |
          echo "📋 Checking script permissions:"
          ls -la scripts/
          for script in scripts/*.sh; do
            if [[ ! -x "$script" ]]; then
              echo "❌ Script $script is not executable"
              exit 1
            else
              echo "✅ Script $script is executable"
            fi
          done
          echo "🎉 All scripts have proper permissions!"

  test-workflow-variations:
    name: Test Configuration Variations
    strategy:
      matrix:
        test-case: [
          { name: "All checks enabled", skip-format: false, skip-length: false, skip-fixup: false },
          { name: "Skip format check", skip-format: true, skip-length: false, skip-fixup: false },
          { name: "Skip length check", skip-format: false, skip-length: true, skip-fixup: false },
          { name: "Skip fixup check", skip-format: false, skip-length: false, skip-fixup: true },
          { name: "Only format check", skip-format: false, skip-length: true, skip-fixup: true }
        ]
    uses: ./.github/workflows/pr-validation.yml
    with:
      skip-format-check: ${{ matrix.test-case.skip-format }}
      skip-length-check: ${{ matrix.test-case.skip-length }}
      skip-fixup-check: ${{ matrix.test-case.skip-fixup }}
    secrets: inherit