name: PR Validation Checks

on:
  workflow_call:
    inputs:
      commit-format-regex:
        description: 'Regex pattern for validating commit message format'
        type: string
        default: '^(feat|fix|docs|style|refactor|test|chore)(\([^\)]+\))?:'
      max-commit-length:
        description: 'Maximum allowed commit message length'
        type: number
        default: 72
      skip-fixup-check:
        description: 'Skip the fixup commits check'
        type: boolean
        default: false
      skip-format-check:
        description: 'Skip the commit format check'
        type: boolean
        default: false
      skip-length-check:
        description: 'Skip the commit length check'
        type: boolean
        default: false

jobs:
  pr-validation:
    name: PR Validation Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ✅ Validate Commit Format
        if: ${{ !inputs.skip-format-check }}
        run: |
          echo "🔍 Checking commit message format..."
          echo "Expected pattern: ${{ inputs.commit-format-regex }}"
          
          # Get base branch reference
          BASE_REF="${{ github.base_ref }}"
          if [ -z "$BASE_REF" ]; then
            BASE_REF="main"
          fi
          
          # Check if base branch exists, fallback to origin/main
          if ! git show-ref --verify --quiet refs/remotes/origin/$BASE_REF; then
            echo "⚠️ Base ref origin/$BASE_REF not found, using origin/main"
            BASE_REF="main"
          fi
          
          INVALID_COMMITS=""
          COMMIT_COUNT=0
          EXIT_CODE=0
          
          # Get commits in this PR (excluding merge commits)
          while IFS=' ' read -r hash message; do
            if [ -n "$hash" ]; then
              # Skip merge commits (they typically start with "Merge")
              if echo "$message" | grep -qE '^Merge '; then
                echo "🔀 Skipping merge commit: $hash - $message"
                continue
              fi
              
              COMMIT_COUNT=$((COMMIT_COUNT + 1))
              if ! echo "$message" | grep -qE '${{ inputs.commit-format-regex }}'; then
                echo "❌ Invalid format: $hash - $message"
                INVALID_COMMITS="$INVALID_COMMITS\n$hash: $message"
                EXIT_CODE=1
              else
                echo "✅ Valid format: $hash - $message"
              fi
            fi
          done < <(git log --format="%H %s" origin/$BASE_REF..HEAD)
          
          if [ $EXIT_CODE -eq 1 ]; then
            echo ""
            echo "🚫 Found commits with invalid format:"
            echo -e "$INVALID_COMMITS"
            echo ""
            echo "💡 Commit messages should follow conventional commit format:"
            echo "   feat: add new feature"
            echo "   fix: resolve bug in component"
            echo "   docs: update README"
            echo "   style: fix formatting"
            echo "   refactor: improve code structure"
            echo "   test: add unit tests"
            echo "   chore: update dependencies"
            echo ""
            echo "   Optional scope: feat(auth): add login endpoint"
            exit 1
          fi
          
          echo "✅ All $COMMIT_COUNT commit messages follow the expected format!"

      - name: ✅ Validate Commit Length
        if: ${{ !inputs.skip-length-check }}
        run: |
          echo "🔍 Checking commit message length (max: ${{ inputs.max-commit-length }} characters)..."
          
          # Get base branch reference
          BASE_REF="${{ github.base_ref }}"
          if [ -z "$BASE_REF" ]; then
            BASE_REF="main"
          fi
          
          # Check if base branch exists, fallback to origin/main
          if ! git show-ref --verify --quiet refs/remotes/origin/$BASE_REF; then
            echo "⚠️ Base ref origin/$BASE_REF not found, using origin/main"
            BASE_REF="main"
          fi
          
          LONG_COMMITS=""
          COMMIT_COUNT=0
          EXIT_CODE=0
          
          # Get commits in this PR
          while IFS=' ' read -r hash message; do
            if [ -n "$hash" ]; then
              COMMIT_COUNT=$((COMMIT_COUNT + 1))
              MESSAGE_LENGTH=${#message}
              if [ $MESSAGE_LENGTH -gt ${{ inputs.max-commit-length }} ]; then
                echo "❌ Too long ($MESSAGE_LENGTH chars): $hash - $message"
                LONG_COMMITS="$LONG_COMMITS\n$hash: $message ($MESSAGE_LENGTH chars)"
                EXIT_CODE=1
              else
                echo "✅ Good length ($MESSAGE_LENGTH chars): $hash - $message"
              fi
            fi
          done < <(git log --format="%H %s" origin/$BASE_REF..HEAD)
          
          if [ $EXIT_CODE -eq 1 ]; then
            echo ""
            echo "🚫 Found commits with messages too long:"
            echo -e "$LONG_COMMITS"
            echo ""
            echo "💡 Keep commit messages under ${{ inputs.max-commit-length }} characters for better readability."
            exit 1
          fi
          
          echo "✅ All $COMMIT_COUNT commit messages are within the length limit!"

      - name: ✅ Check for Fixup Commits
        if: ${{ !inputs.skip-fixup-check }}
        run: |
          echo "🔍 Checking for fixup commits..."
          
          # Get base branch reference
          BASE_REF="${{ github.base_ref }}"
          if [ -z "$BASE_REF" ]; then
            BASE_REF="main"
          fi
          
          # Check if base branch exists, fallback to origin/main
          if ! git show-ref --verify --quiet refs/remotes/origin/$BASE_REF; then
            echo "⚠️ Base ref origin/$BASE_REF not found, using origin/main"
            BASE_REF="main"
          fi
          
          # Check for fixup commits
          FIXUP_COMMITS=$(git log --format="%H %s" origin/$BASE_REF..HEAD | grep '^[a-f0-9]\+ fixup!' || true)
          
          if [ -n "$FIXUP_COMMITS" ]; then
            echo "🚫 Found fixup commits in this PR:"
            echo "$FIXUP_COMMITS"
            echo ""
            echo "💡 Please squash fixup commits before merging:"
            echo "   git rebase -i origin/$BASE_REF"
            echo "   or"
            echo "   git reset --soft origin/$BASE_REF && git commit"
            exit 1
          fi
          
          echo "✅ No fixup commits found!"

      - name: 📊 Generate Validation Summary
        if: always()
        run: |
          echo "## PR Validation Results 📋" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Get step outcomes from job context
          FORMAT_OUTCOME="${{ steps.format.outcome || 'skipped' }}"
          LENGTH_OUTCOME="${{ steps.length.outcome || 'skipped' }}"
          FIXUP_OUTCOME="${{ steps.fixup.outcome || 'skipped' }}"
          
          # Note: Step outcomes aren't directly accessible, so we'll analyze job status instead
          if [ "${{ inputs.skip-format-check }}" = "true" ]; then
            echo "- 🔘 **Commit Format Check:** Skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ **Commit Format Check:** Completed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ inputs.skip-length-check }}" = "true" ]; then
            echo "- 🔘 **Commit Length Check:** Skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ **Commit Length Check:** Completed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ inputs.skip-fixup-check }}" = "true" ]; then
            echo "- 🔘 **Fixup Commits Check:** Skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ **Fixup Commits Check:** Completed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎉 All enabled validation checks completed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "Your commits meet the required standards and are ready for review." >> $GITHUB_STEP_SUMMARY
          
          # Add helpful information
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**Validation Rules Applied:**" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ inputs.skip-format-check }}" != "true" ]; then
            echo "- Conventional commit format: \`${{ inputs.commit-format-regex }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ inputs.skip-length-check }}" != "true" ]; then
            echo "- Maximum commit message length: ${{ inputs.max-commit-length }} characters" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ inputs.skip-fixup-check }}" != "true" ]; then
            echo "- No fixup commits allowed in final PR" >> $GITHUB_STEP_SUMMARY
          fi