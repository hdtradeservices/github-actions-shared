# Minimal PR Validation for Repositories with Special Requirements
# Place this file at: .github/workflows/pr-checks.yml

name: PR Validation Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-validation:
    uses: hdtradeservices/github-actions-shared/.github/workflows/pr-validation.yml@main
    with:
      # Only check commit format, skip length and fixup checks
      skip-fixup-check: true
      skip-length-check: true
      # Use standard format check
      skip-format-check: false
    secrets: inherit